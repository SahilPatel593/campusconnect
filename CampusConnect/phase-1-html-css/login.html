<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            🎓 CampusConnect
        </a>
        <button class="navbar-toggle" id="navToggle">☰</button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <!-- LOGIN FORM -->
    <div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; background-color: var(--light-gray);">
        <div class="form-container">
            <h2 style="text-align: center; color: var(--primary-dark); margin-bottom: 2rem;">
                🔐 Login to CampusConnect
            </h2>

            <form id="loginForm">
                <!-- Email Input -->
                <div class="form-group">
                    <label for="email">📧 Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your.email@college.edu"
                        required
                    >
                </div>

                <!-- Password Input -->
                <div class="form-group">
                    <label for="password">🔑 Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <!-- Remember Me -->
                <div class="form-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember" style="display: inline; margin-left: 0.5rem;">Remember me</label>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">
                    Login
                </button>

                <!-- Forgot Password Link -->
                <p style="text-align: center; margin-top: 1rem;">
                    <a href="#" style="color: var(--primary-blue); text-decoration: none;">Forgot password?</a>
                </p>

                <!-- Signup Link -->
                <p style="text-align: center; margin-top: 1rem;">
                    Don't have an account? 
                    <a href="#" style="color: var(--primary-blue); font-weight: bold; text-decoration: none;">Sign up</a>
                </p>
            </form>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2024 CampusConnect. All rights reserved.</p>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="contact.html">Contact</a>
            <a href="#privacy">Privacy Policy</a>
        </div>
    </footer>

    <script>
        // Mobile menu toggle
        const navToggle = document.getElementById('navToggle');
        const navLinks = document.getElementById('navLinks');

        navToggle.addEventListener('click', function() {
            navLinks.classList.toggle('active');
        });

        // Handle login form submission
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            alert(`Welcome ${email}!\n\nNote: This is Phase 1 (Static HTML). Actual authentication will be added in later phases.`);
        });
    </script>
</body>

</html>
